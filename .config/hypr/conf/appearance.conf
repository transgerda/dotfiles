general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(414868FF) rgba(33467CFF) 45deg
    col.inactive_border = rgba(15161Ecc)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}
decoration {
    active_opacity = .95
    inactive_opacity = .9
    rounding = 8
    shadow {
        enabled = true
        range = 6
        render_power = 3
        color = rgba(15161Eee)
    }
    blur {
        enabled = true
        size = 6
        passes = 3
        contrast = 1.5
        brightness = 1
    }
}

animations {
    enabled = yes, please :)

    bezier = floaty, 0.25, 1.35, 0.45, 1
    bezier = snap, 0.1, 0.9, 0.2, 1
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 8, default
    animation = border, 1, 6, easeOutQuint

    animation = windows, 1, 5.5, floaty, popin 90%
    animation = windowsIn, 1, 4.5, floaty, popin 85%
    animation = windowsOut, 1, 3, snap, popin 92%

    animation = fadeIn, 1, 2, almostLinear
    animation = fadeOut, 1, 2, almostLinear
    animation = fade, 1, 3.5, quick

    animation = layers, 1, 4.5, floaty
    animation = layersIn, 1, 4.5, floaty, fade
    animation = layersOut, 1, 2.5, snap, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear

    animation = workspaces, 1, 5, floaty, slidefade 15%
    animation = workspacesIn, 1, 4, floaty, slidefade 10%
    animation = workspacesOut, 1, 3, snap, slidefade 10%
}
