# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, C, killactive,
bind = $mainMod CTRL, p, exec, wlogout -b 5
bind = $mainMod CTRL, l, exec, hyprlock
bind = $mainMod CTRL, c, exec, ~/.config/hypr/scripts/toggleCompact.sh
bind = $mainMod, A , exec, rofi -show run -p 'Exec' -theme ~/.config/rofi/global.rasi
bind = $mainMod CTRL, A, exec, ~/dotfiles/.config/hypr/scripts/toggleWaybar.sh
# bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, togglefloating,
bindr = $mainMod, SUPER_L, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, fullscreen
# bind = $mainMod, J, togglesplit, # dwindle

# Take screenshot with Grimblast
bind = , PRINT, exec, grimblast copysave area
bind = $mainMod_SHIFT, PRINT, exec, grimblast copysave output

# Swaync manager toggle
bind = $mainMod CTRL, n, exec, swaync-client -t -sw

# Move focus with mainMod + arrow keys
bind = ALT, h, movefocus, l
bind = ALT, l, movefocus, r
bind = ALT, k, movefocus, u
bind = ALT, j, movefocus, d

bind = ALT, x, movewindow, l
bind = ALT, c, movewindow, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, j, workspace, 1
bind = $mainMod, k, workspace, 2
bind = $mainMod, l, workspace, 3
bind = $mainMod, w, workspace, 4
bind = $mainMod, n, workspace, 5
bind = $mainMod, m, workspace, 6
bind = $mainMod, q, workspace, 7
bind = $mainMod, w, workspace, 8
bind = $mainMod, u, workspace, 9
bind = $mainMod, i, workspace, 10

bind = $mainMod CTRL, o, exec, shutdown 

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, j, movetoworkspace, 1
bind = $mainMod SHIFT, k, movetoworkspace, 2
bind = $mainMod SHIFT, l, movetoworkspace, 3
bind = $mainMod SHIFT, w, movetoworkspace, 4
bind = $mainMod SHIFT, n, movetoworkspace, 5
bind = $mainMod SHIFT, m, movetoworkspace, 6
bind = $mainMod SHIFT, q, movetoworkspace, 7
bind = $mainMod SHIFT, w, movetoworkspace, 8
bind = $mainMod SHIFT, u, movetoworkspace, 9
bind = $mainMod SHIFT, i, movetoworkspace, 10

#open app
bind = SUPER, t, exec, $terminal
bind = SUPER, g, exec, firefox
bind = $mainMod, z, exec, ./.config/scripts/rofi/clipboard.sh
bind = $mainMod SHIFT, z, exec, ~/.config/scripts/rofi/emoji.sh

# display brightness
bind = $mainMod ALT, q, exec, brightnessctl s 50-
bind = $mainMod ALT, w, exec, brightnessctl s +50

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
